<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campfixer</title>
  <!-- Caveat is used only for the logo wordmark; 700 weight only to keep the download small. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" id="meta-theme-color" />

  <!--
    Must load first: registers coi-serviceworker.js so it can inject COOP/COEP
    headers on the next page load.  SharedArrayBuffer (required by sqlite-wasm)
    is gated on those headers, which GitHub Pages cannot serve natively.
  -->
  <script src="coi-serviceworker.js"></script>

  <!--
    Apply the saved theme BEFORE the page renders to prevent a flash of the
    wrong theme. Must run synchronously in <head>.
    Falls back to the system preference if nothing is stored.
  -->
  <script>
    (function () {
      var stored = localStorage.getItem('campfixer:theme');
      var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && sysDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
  <div class="max-w-4xl mx-auto px-4 py-4">

    <header class="flex items-center justify-between gap-4 mb-4">
      <div>
        <h1 class="logo-brand">Camp<span class="logo-accent">Fixer</span></h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">
          Plan car camping packing with templates and auto-sync updates.
        </p>
      </div>
      <div class="flex items-center gap-2">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle light/dark mode" title="Toggle theme">
          <span id="theme-icon">🌙</span>
        </button>
        <!-- Hamburger: only visible on mobile; wired in main.js -->
        <button id="open-menu" class="btn-icon md:hidden" aria-label="Open navigation">☰</button>
      </div>
    </header>

    <!-- Hidden on mobile by default. Hamburger adds .nav-open; md+ always shows via CSS. -->
    <nav id="app-nav" class="flex-wrap gap-2 mb-4">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="templates">Templates</button>
      <button class="nav-btn" data-view="plans">Packing Plans</button>
    </nav>

    <main id="app-main" class="min-h-96"></main>
  </div>

  <!-- ─── View templates ──────────────────────────────────────────────── -->

  <template id="dashboard-template">
    <section class="panel">
      <h2 class="text-xl font-semibold mb-1">Campfixer Dashboard</h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-5">
        Use templates to create custom car camping packing plans. Sync plans when you add new default items.
      </p>
      <div class="card-grid">
        <div class="card">
          <h3>Templates</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Manage your car camping templates and default pack items.</p>
          <button data-action="goto" data-target="templates" class="btn-primary">Open Templates</button>
        </div>
        <div class="card">
          <h3>Packing Plans</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Create and sync plans from templates, then keep your packing list ready.</p>
          <button data-action="goto" data-target="plans" class="btn-primary">Open Plans</button>
        </div>
        <div class="card">
          <h3>Backup</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Download a copy of the SQLite database file for offline backup.</p>
          <button data-action="download-db" class="btn-secondary">⬇ Download database</button>
        </div>
      </div>
    </section>
  </template>

  <template id="templates-list-template">
    <section class="panel">
      <div class="panel-header">
        <h2 class="text-xl font-semibold">Templates</h2>
        <button data-action="create-template" class="btn-primary">New template</button>
      </div>
      <div id="templates-list" class="list"></div>
      <p class="empty-state" id="templates-empty">No templates found. Add one to get started.</p>
    </section>
  </template>

  <template id="template-editor-template">
    <section class="panel">
      <div class="panel-header">
        <button data-action="back-to-templates" class="btn-secondary">← Back</button>
        <h2 id="template-editor-title" class="text-xl font-semibold"></h2>
      </div>
      <form id="template-form" class="form-grid">
        <label>
          Template name
          <input type="text" name="name" required />
        </label>
        <label>
          Description
          <textarea name="description" rows="3"></textarea>
        </label>
      </form>
      <div class="section-header mt-6 mb-1">
        <h3 class="font-semibold text-slate-900 dark:text-slate-100">Default items</h3>
        <button data-action="add-item" class="btn-secondary">+ Add item</button>
      </div>
      <div id="template-items" class="list"></div>
      <div class="form-actions">
        <button data-action="save-template" class="btn-primary">Save template</button>
        <button data-action="delete-template" class="btn-danger">Delete template</button>
      </div>
    </section>
  </template>

  <template id="plans-list-template">
    <section class="panel">
      <div class="panel-header">
        <h2 class="text-xl font-semibold">Packing Plans</h2>
        <button data-action="create-plan" class="btn-primary">New packing plan</button>
      </div>
      <div id="plans-list" class="list"></div>
      <p class="empty-state" id="plans-empty">No plans created yet. Create one from a template.</p>
    </section>
  </template>

  <template id="plan-detail-template">
    <section class="panel">
      <div class="panel-header">
        <button data-action="back-to-plans" class="btn-secondary">← Back</button>
        <div>
          <h2 id="plan-title" class="text-xl font-semibold"></h2>
          <p id="plan-from-template" class="text-sm text-slate-500 dark:text-slate-400"></p>
        </div>
      </div>
      <div class="section-header mb-1">
        <h3 class="font-semibold text-slate-900 dark:text-slate-100">Packing items</h3>
        <button data-action="add-plan-item" class="btn-secondary">+ Add item</button>
      </div>
      <div id="plan-items" class="list"></div>
      <div class="form-actions">
        <button data-action="sync-plan" class="btn-sync">Sync with template</button>
        <button data-action="push-to-template" class="btn-push">Push items to template</button>
        <button data-action="save-plan" class="btn-primary">Save plan</button>
        <button data-action="delete-plan" class="btn-danger">Delete plan</button>
        <button data-action="download-db" class="btn-secondary">⬇ Download database</button>
      </div>
    </section>
  </template>

  <script type="module" src="src/main.js"></script>
</body>
</html>
