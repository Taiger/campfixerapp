<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campfixer</title>
  <!-- Caveat for logo wordmark; Nunito for body and workflow UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F5F0E8" id="meta-theme-color" />

  <!--
    Must load first: registers coi-serviceworker.js so it can inject COOP/COEP
    headers on the next page load.  SharedArrayBuffer (required by sqlite-wasm)
    is gated on those headers, which GitHub Pages cannot serve natively.
  -->
  <script src="coi-serviceworker.js" defer></script>

  <!--
    Apply the saved theme BEFORE the page renders to prevent a flash of the
    wrong theme. Must run synchronously in <head>.
    Falls back to the system preference if nothing is stored.
  -->
  <script>
    (function () {
      var stored = localStorage.getItem('campfixer:theme');
      var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && sysDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-aged-paper dark:bg-dark-moss text-stone-900 dark:text-stone-100 min-h-screen transition-colors duration-200 font-body pb-20">

  <div class="max-w-2xl mx-auto">

    <header class="flex items-center justify-between gap-4 px-4 pt-4 pb-3">
      <a href="#" id="logo-home" class="logo-brand" aria-label="Go to Trips">Camp<span class="logo-accent">Fixer</span></a>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle light/dark mode" title="Toggle theme">
        <span id="theme-icon">🌙</span>
      </button>
    </header>

    <main id="app-main" class="min-h-96"></main>
  </div>

  <!-- Fixed bottom navigation bar -->
  <nav id="bottom-nav">
    <button class="bottom-nav-btn active" data-view="trips" id="nav-trips">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Trips</span>
    </button>
    <button class="bottom-nav-btn" data-view="config" id="nav-config">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- FAB: Create new trip (hidden by default, shown on trips view) -->
  <button id="fab-new-trip" class="fab fixed bottom-20 right-5 z-30 hidden" aria-label="Create new trip">
    <svg viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
      <!-- Paw print -->
      <ellipse cx="12" cy="17.5" rx="5" ry="4"/>
      <circle cx="6.5" cy="12.5" r="2.5"/>
      <circle cx="17.5" cy="12.5" r="2.5"/>
      <circle cx="9.5" cy="8.5" r="2"/>
      <circle cx="14.5" cy="8.5" r="2"/>
    </svg>
  </button>

  <script type="module" src="src/main.js"></script>
</body>
</html>
